<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Future TL Overlay Settings</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="settings-body">
    <main class="settings-window">
      <section class="edit-panel edit-panel--standalone">
        <div class="edit-panel__header">
          <strong>Future TL Overlay</strong>
          <span><b id="settings-shortcut-hint">Ctrl + Shift + W</b> - закрыть</span>
        </div>
        <p class="edit-panel__hint">Ленту можно двигать отдельно: наведитесь на саму ленту и перетащите её мышью.</p>
        <label>
          Дизайн
          <select id="preset-select">
            <option value="wide">Стандартная</option>
            <option value="compact">Компактная</option>
            <option value="focus">Подробная</option>
            <option value="rain">Дождь</option>
          </select>
        </label>
        <label>
          Ширина
          <input id="width-input" type="range" min="520" max="980" step="20" />
        </label>
        <label>
          Прозрачность
          <input id="opacity-input" type="range" min="35" max="100" step="5" />
        </label>
        <label>
          Масштаб
          <input id="scale-input" type="range" min="80" max="125" step="5" />
        </label>
        <label class="shortcut-field">
          Настройки
          <span class="shortcut-field__controls">
            <button id="shortcut-capture-button" type="button">Ctrl + Shift + W</button>
            <button id="shortcut-reset-button" type="button" title="Вернуть стандартную комбинацию">Сброс</button>
          </span>
        </label>
        <button class="overlay-power-button" id="overlay-quit-button" type="button">ВЫКЛЮЧИТЬ ОВЕРЛЕЙ</button>
        <section class="settings-update">
          <div class="settings-update__header">
            <strong>Обновления</strong>
            <span id="update-version">v--</span>
          </div>
          <p id="update-status">Проверка обновлений...</p>
          <div class="settings-update__actions">
            <button id="update-check-button" type="button">Проверить</button>
            <button id="update-install-button" type="button" hidden>ОБНОВИТЬ</button>
          </div>
        </section>
        <footer class="settings-about">
          <p>
            Подробная информация о смене циклов погоды -
            <a href="https://futuretl.ru/" data-external-link>futuretl.ru</a>
          </p>
          <p>
            Проект разработан при поддержке<br />
            Гильдии <strong>"FUTURE"</strong> | Сервер <strong>"Джанарот"</strong>
          </p>
        </footer>
      </section>
    </main>

    <script type="module" src="./settings-renderer.js"></script>
  </body>
</html>
